aid: amazon-verified-permissions
name: Amazon Verified Permissions
description: >-
  Amazon Verified Permissions is a scalable, fine-grained permissions management
  and authorization service for the applications you build. Using Cedar, an
  expressive and analyzable open-source policy language, it helps developers
  build secure applications faster by externalizing authorization and centralizing
  policy management.
