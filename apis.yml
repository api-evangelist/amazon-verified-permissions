apis:
  - aid: amazon-verified-permissions:amazon-verified-permissions-api
    name: Amazon Verified Permissions API
    description: >-
      The Amazon Verified Permissions API provides programmatic access to manage
      policy stores, policies, policy templates, identity sources, and schemas.
      It enables fine-grained authorization using the Cedar policy language,
      supporting real-time authorization decisions for application resources.
